{% extends 'payapp/transaction-base.html' %}#
{% load crispy_forms_tags %}
{% block transaction_content %}
    <h2>Send Money</h2>
    <form method="POST">

    <p>Your current balance is {{ currency_symbol }}{{ user.balance }}</p>
     {% csrf_token %}
    {{ form | crispy}}
        <button class="btn btn-primary w-100 mt-3" type="submit">Send</button>
    </form>
{% endblock %}
